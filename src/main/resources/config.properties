# ───────────────────────────────────────────────────────────────
# Enuygun automation framework — runtime configuration.
# Every key may be overridden from the CLI via -Dkey=value.
# ───────────────────────────────────────────────────────────────

# Target site
base.url=https://www.enuygun.com

# Default browser when testng.xml does not pass one (chrome | firefox)
browser=chrome

# Run browser without UI window
headless=false

# Default explicit-wait timeout (seconds) for WaitUtils
explicit.wait=10

# Page-load timeout used by WebDriver (seconds)
page.load.timeout=45

# Max retry count for a failed @Test method (0 = retries disabled)
retry.max=1
